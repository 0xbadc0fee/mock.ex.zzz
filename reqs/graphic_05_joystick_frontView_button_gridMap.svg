<?xml version="1.0" encoding="UTF-8"?>
<!--
  ============================================================================
  NORMALIZED SVG REFERENCE EXAMPLE
  ============================================================================
  Source  : CorelDRAW X7 export, post-processed to normalized form.
  Purpose : Canonical model for logically-named, data-attributed SVG artifacts.

  NORMALIZATION RULES APPLIED
  ===========================
  1. Corel <metadata>/<odm> blocks promoted to real XML attributes on the
     owning element, then removed entirely. No proprietary markup remains.
  2. Duplicate metadata that Corel copied onto each group's first child has
     been discarded. Attributes live ONLY on the named object group.
  3. Every named object is a <g> element. Never a bare shape. This guarantees
     downstream code can always assume manipulable children exist.
  4. ID namespacing:
       obj_*   - a physical control that maps to an ECU signal
       meta_*  - annotation / layout scaffolding, carries no signal meaning
  5. Attribute order on obj_* groups is canonical (see below), so that diffs
     in version control are minimal and reviewable.
  6. No nested duplicate IDs. IDs are unique document-wide.

  CANONICAL ATTRIBUTE ORDER
  =========================
     id, data-type, data-signal-min, data-signal-max, data-states,
     data-default-state, data-pin, data-can-spn, data-req-id, class, transform

  ATTRIBUTE CONTRACT
  ==================
    data-type          Required. One of: axis | boolean | switchCase
    data-signal-min    Required when type=axis|boolean. Numeric.
    data-signal-max    Required when type=axis|boolean. Numeric.
    data-states        Required when type=switchCase. Comma-separated enum.
                       Replaces min/max, which cannot express discrete states.
    data-default-state Optional. Must be a member of data-states.
    data-pin           Connector pin designation. Ties drawing to harness.
    data-can-spn       Signal name for CAN/J1939 mapping and header generation.
    data-req-id        Requirement identifier for V-model traceability.

  LINTABLE INVARIANTS
  ===================
    - Every obj_* element is a <g>.
    - Every obj_* group has data-type.
    - type=axis|boolean implies both data-signal-min and data-signal-max.
    - type=switchCase implies data-states, and forbids min/max.
    - data-default-state, if present, appears in data-states.
    - No <metadata> or <odm> elements anywhere.
    - All id values unique.

  NOTE ON SAMPLE VALUES
  =====================
  data-pin, data-can-spn and data-req-id values below are ILLUSTRATIVE
  placeholders demonstrating the pattern. Replace with real assignments.
  ============================================================================
-->
